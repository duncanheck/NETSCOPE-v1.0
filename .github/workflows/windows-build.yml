name: windows-build

# Builds the single-file Windows product: the React UI is compiled and embedded
# into the Rust agent (feature `bundled-ui`), producing one self-contained
# `netscope.exe` that serves the UI and the live capture feed on 127.0.0.1:8787
# and opens the browser. Runs on a real Windows runner (MSVC), so the binary —
# including the Windows GetExtendedTcpTable capture source, which can't be built
# or tested from Linux — is compiled and smoke-checked on the target OS.
#
# The exe is uploaded as a build artifact on every push to a dev branch; tagging
# `v*` additionally publishes it as a GitHub Release asset.

on:
  push:
    branches: ["claude/**", "main", "latest"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build netscope.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # --- Frontend: build and embed (VITE_TRANSPORT=websocket so the bundled UI
      #     talks to the agent that serves it, not the mock feed) ---
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: build frontend
        working-directory: frontend
        env:
          VITE_TRANSPORT: websocket
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # --- Agent: release build with the UI embedded ---
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: build agent (release, bundled-ui)
        working-directory: agent
        env:
          # Stamp the binary so the self-updater can compare builds. The run number
          # is monotonic and is the comparison key in the manifest below.
          NETSCOPE_BUILD_ID: ${{ github.run_number }}
          NETSCOPE_BUILD_SHA: ${{ github.sha }}
        run: cargo build --release -p netscope-agent --features bundled-ui

      - name: stage artifact
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item agent/target/release/netscope-agent.exe dist/netscope.exe
          Copy-Item README.md dist/README.md

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netscope-windows-x64
          path: dist/netscope.exe
          if-no-files-found: error

      # --- Rolling "latest" build (trunk only): the channel installed apps self-update
      #     from. Write the manifest the agent reads (build id = run number = the
      #     comparison key; sha256 = integrity check), then refresh the `latest`
      #     pre-release with the exe + manifest. This repo's trunk branch is
      #     `latest` (there is no `main` branch here). ---
      - name: write update manifest
        if: github.ref == 'refs/heads/latest' || github.ref == 'refs/heads/main'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          $hash = (Get-FileHash dist/netscope.exe -Algorithm SHA256).Hash.ToLower()
          $repo = "${{ github.repository }}"
          $builtAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $notes = ($env:COMMIT_MSG -split "`n")[0]
          $manifest = [ordered]@{
            build    = [int]${{ github.run_number }}
            sha      = "${{ github.sha }}"
            built_at = $builtAt
            exe_url  = "https://github.com/$repo/releases/download/latest/netscope.exe"
            sha256   = $hash
            notes    = $notes
          }
          $manifest | ConvertTo-Json -Compress | Out-File -Encoding ascii -NoNewline dist/latest.json
          Get-Content dist/latest.json

      - name: publish rolling release
        if: github.ref == 'refs/heads/latest' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest dev build
          prerelease: true
          # A rolling tag, not the headline release — re-pointed to each main commit.
          make_latest: false
          files: |
            dist/netscope.exe
            dist/latest.json

      # --- Release on tag ---
      - name: publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/netscope.exe
          fail_on_unmatched_files: true
